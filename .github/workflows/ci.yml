name: Set up JDK 25 with MySQL

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Spin up the MySQL container as a background service
    services:
      mysql-db:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: store
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        # Wait until MySQL is fully initialized before starting the job steps
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Run Tests
        run: |
          chmod +x mvnw
          ./mvnw clean test
        env:
          # Map application properties to the GitHub runner environment
          MYSQL_HOST: localhost
          MYSQL_PORT: 3306
          MYSQL_DATABASE: store
          MYSQL_USER: root
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}

      # Login to Docker
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push the Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/terxiel_store:latest
            ${{ vars.DOCKERHUB_USERNAME }}/terxiel_store:${{ github.sha }}