services:
  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
    ports: 
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - backend-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysql -h localhost -u ${DB_USER} -p${DB_PASSWORD} -e 'SELECT 1'"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET_KEY=${STRIPE_WEBHOOK_SECRET_KEY}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME}
      - DB_USERNAME=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - backend-network
    depends_on:
      db:
        condition: service_healthy



volumes:
  mysql-data:

networks:
  backend-network:
    name: backend-network
    driver: bridge
